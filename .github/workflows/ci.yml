name: ci

on:
  push:
    branches:
      - main
      - podman-*
  pull_request:
    branches:
      - main
      - podman-*

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.x"
  LIMA_VERSION: "v2.1.1"

jobs:
  path-filter:
    runs-on: ubuntu-24.04
    outputs:
      storage: ${{ steps.filter.outputs.storage }}
      image: ${{ steps.filter.outputs.image }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            storage:
              - '.github/workflows/ci.yml'
              - 'hack/ci/**'
              - 'go.work'
              - 'go.work.sum'
              - 'storage/**'
            image:
              - '.github/workflows/ci.yml'
              - 'hack/ci/**'
              - 'go.work'
              - 'go.work.sum'
              - 'storage/**'
              - 'image/**'

  storage-test:
    needs: path-filter
    if: github.event_name == 'push' || needs.path-filter.outputs.storage == 'true'
    runs-on: cncf-ubuntu-8-32-x86
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        distro: [fedora-current, debian-sid]
        driver: [vfs, overlay, overlay-transient, fuse-overlay, fuse-overlay-whiteout, btrfs]
        exclude:
          - distro: debian-sid
            driver: overlay-transient
    name: "Storage: ${{ matrix.distro }} ${{ matrix.driver }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: lima-vm/lima-actions/setup@55627e31b78637bf254a8b2a14da8ea7d12564e5 # v1.1.0
        with:
          version: ${{ env.LIMA_VERSION }}
      - name: Run tests
        run: ./hack/ci/ci.sh storage ${{ matrix.distro }} ${{ matrix.driver }}
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: "logs-storage-${{ matrix.distro }}-${{ matrix.driver }}"
          path: |
            ./hack/ci/journal.log
            ./hack/ci/audit.log
            ./hack/ci/df.log
          if-no-files-found: ignore

  storage-cross:
    needs: path-filter
    if: github.event_name == 'push' || needs.path-filter.outputs.storage == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    name: "Storage: Cross"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "./storage/go.sum"
      - name: Cross-compile
        working-directory: ./storage
        run: make cross

  storage-gofix:
    needs: path-filter
    if: github.event_name == 'push' || needs.path-filter.outputs.storage == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    name: "Storage: gofix"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "./storage/go.sum"
      - name: Install dependencies
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install -y libbtrfs-dev libgpgme-dev libdevmapper-dev
      - name: Run go fix
        working-directory: ./storage
        run: go fix -diff ./...

  image-cross:
    needs: path-filter
    if: github.event_name == 'push' || needs.path-filter.outputs.image == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    name: "Image: Cross"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "./image/go.sum"
      - name: Install dependencies
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install -y libgpgme-dev libassuan-dev libbtrfs-dev libdevmapper-dev
      - name: Cross-compile
        working-directory: ./image
        run: make cross

  image-test:
    needs: path-filter
    if: github.event_name == 'push' || needs.path-filter.outputs.image == 'true'
    runs-on: cncf-ubuntu-8-32-x86
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        variant: [default, openpgp, sequoia]
    name: "Image: Test ${{ matrix.variant }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: lima-vm/lima-actions/setup@55627e31b78637bf254a8b2a14da8ea7d12564e5 # v1.1.0
        with:
          version: ${{ env.LIMA_VERSION }}
      - name: Run tests
        run: ./hack/ci/ci.sh image fedora-current ${{ matrix.variant }}
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: "logs-image-${{ matrix.variant }}"
          path: |
            ./hack/ci/journal.log
            ./hack/ci/audit.log
            ./hack/ci/df.log
          if-no-files-found: ignore

  image-test-skopeo:
    needs: path-filter
    if: github.event_name == 'push' || needs.path-filter.outputs.image == 'true'
    runs-on: cncf-ubuntu-8-32-x86
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        variant: [default, openpgp, sequoia]
    name: "Image: Skopeo ${{ matrix.variant }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: lima-vm/lima-actions/setup@55627e31b78637bf254a8b2a14da8ea7d12564e5 # v1.1.0
        with:
          version: ${{ env.LIMA_VERSION }}
      - name: Run tests
        run: ./hack/ci/ci.sh image-skopeo fedora-current ${{ matrix.variant }}
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: "logs-image-skopeo-${{ matrix.variant }}"
          path: |
            ./hack/ci/journal.log
            ./hack/ci/audit.log
            ./hack/ci/df.log
          if-no-files-found: ignore

  common-test:
    runs-on: cncf-ubuntu-8-32-x86
    timeout-minutes: 45
    name: "Common: Test"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: lima-vm/lima-actions/setup@55627e31b78637bf254a8b2a14da8ea7d12564e5 # v1.1.0
        with:
          version: ${{ env.LIMA_VERSION }}
      - name: Run tests
        run: ./hack/ci/ci.sh common fedora-current
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: "logs-common"
          path: |
            ./hack/ci/journal.log
            ./hack/ci/audit.log
            ./hack/ci/df.log
          if-no-files-found: ignore

  # N/B: GitHub merge protection is configured for this exact job name, DO NOT CHANGE IT.
  success:
    name: "Total Success"
    if: always()
    needs:
      - storage-test
      - storage-cross
      - storage-gofix
      - image-cross
      - image-test
      - image-test-skopeo
      - common-test
    runs-on: ubuntu-24.04
    steps:
      - name: Check all required jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "All required jobs passed or were skipped"
